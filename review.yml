    summary: >-
      Verified live: the uO Research institutional repository (Recherche uO
      Research) runs DSpace 7.6.5 and exposes a public DSpace REST/HATEOAS API
      and an OAI-PMH 2.0 endpoint, both returning HTTP 200 and self-describing
      metadata. The official uottawa-wcms GitHub organization (Drupal/WCMS
      modules, ~34 repos) and the official LinkedIn school page and website were
      confirmed. No unified public developer portal, no documented open-data
      API, and no public course/catalog/SIS or mobile-backend API were found;
      enterprise and student systems appear gated behind institutional SSO. No
      endpoints were fabricated.
