aid: university-of-ottawa
name: University of Ottawa
description: >-
  The University of Ottawa (uOttawa) is a public bilingual research university
  in Ottawa, Ontario, Canada, and the largest English-French bilingual
  university in the world. It is ranked #189 in the QS World University Rankings
  2025. Its public, machine-readable developer footprint is concentrated in the
  library's institutional repository, uO Research (Recherche uO Research), which
  runs on DSpace 7.6.5 and exposes both a public DSpace REST/HATEOAS API and an
  OAI-PMH 2.0 metadata-harvesting endpoint. uOttawa does not operate a single
  unified public developer portal; most enterprise and student-information
  systems are gated behind institutional SSO.
